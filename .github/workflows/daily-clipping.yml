name: Daily Clipping

on:
  schedule:
    # 23:30 UTC = 08:30 KST
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-clipping:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily clipping
        run: python run_daily_clipping.py --sectors 반도체,조선 --max-items 15
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_STRING_SESSION: ${{ secrets.TELEGRAM_STRING_SESSION }}
          WATCH_CHANNELS: ${{ secrets.WATCH_CHANNELS }}
          SEMICON_CHANNELS: ${{ secrets.SEMICON_CHANNELS }}
          SHIPBUILDING_CHANNELS: ${{ secrets.SHIPBUILDING_CHANNELS }}
          SHIPBUILDING_NEWS_QUERIES: ${{ secrets.SHIPBUILDING_NEWS_QUERIES }}
          SPOT_PRICE_CHANNEL: ${{ secrets.SPOT_PRICE_CHANNEL }}
          SPOT_PRICE_DAILY_LIMIT: ${{ secrets.SPOT_PRICE_DAILY_LIMIT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini

      - name: Commit clipping database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/reports.sqlite3
          git add -f data/spot_images || true
          if git diff --cached --quiet; then
            echo "No clipping database changes to commit."
          else
            git commit -m "Update daily clipping database"
            git push
          fi
